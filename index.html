  // ----- helper functions -----
  function getAllPositions() {
    const posMap = new Map();
    committeeData.forEach(item => {
      posMap.set(item.position, (posMap.get(item.position) || 0) + 1);
    });
    return Array.from(posMap.keys()).sort((a,b) => {
      const order = ["সভাপতি", "সহ-সভাপতি", "সাধারণ সম্পাদক", "যুগ্ম সাধারণ সম্পাদক", "সাংগঠনিক সম্পাদক"];
      let ia = order.indexOf(a), ib = order.indexOf(b);
      if(ia !== -1 && ib !== -1) return ia - ib;
      if(ia !== -1) return -1;
      if(ib !== -1) return 1;
      return a.localeCompare(b, 'bn');
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  function renderMembers(members, title) {
    const container = document.getElementById("membersContainer");
    const titleElem = document.getElementById("categoryTitle");
    const countSpan = document.getElementById("memberCountBadge");
    if (!members.length) {
      container.innerHTML = `<div class="empty-state">😔 কোন সদস্য পাওয়া যায়নি</div>`;
      titleElem.innerText = title;
      countSpan.innerText = `০ জন`;
      return;
    }
    let html = "";
    members.forEach(m => {
      html += `
        <div class="member-card">
          <div class="member-icon">👤</div>
          <div class="member-info">
            <div class="member-name">${escapeHtml(m.name)}</div>
            <div class="member-position">${escapeHtml(m.position)}</div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
    titleElem.innerText = title;
    countSpan.innerText = `${members.length} জন`;
  }

  // ---- dropdown logic ----
  const dropdownBtn = document.getElementById("dropdownBtn");
  const dropdownContent = document.getElementById("dynamicDropdown");
  const dropdownContainerDiv = document.getElementById("dropdownContainer");

  function openDropdown() { dropdownContent.classList.add("show"); }
  function closeDropdown() { dropdownContent.classList.remove("show"); }
  function toggleDropdown(e) {
    e.stopPropagation();
    if (dropdownContent.classList.contains("show")) closeDropdown();
    else openDropdown();
  }

  document.addEventListener("click", function(event) {
    if (!dropdownContainerDiv.contains(event.target)) closeDropdown();
  });
  dropdownContent.addEventListener("click", function(e) { e.stopPropagation(); });
  dropdownBtn.addEventListener("click", toggleDropdown);

  // ---- filter functions ----
  function filterByPosition(position) {
    const filtered = committeeData.filter(item => item.position === position);
    renderMembers(filtered, `📌 ${position}`);
    document.getElementById("searchInput").value = "";
    closeDropdown();
  }

  function showAllMembers() {
    renderMembers(committeeData, "সকল সদস্য");
    document.getElementById("searchInput").value = "";
    closeDropdown();
  }

  function searchByName() {
    const query = document.getElementById("searchInput").value;
    const q = query.trim().toLowerCase();
    if (q === "") {
      showAllMembers();
      return;
    }
    const results = committeeData.filter(item => item.name.toLowerCase().includes(q));
    if (results.length === 0) {
      renderMembers([], `🔎 "${query}" - কোনো ফলাফল পাওয়া যায়নি`);
    } else {
      renderMembers(results, `🔎 "${query}" - ফলাফল (${results.length} জন)`);
    }
    closeDropdown();
  }

  // Build dropdown menu items
  function buildDropdownMenu() {
    const positions = getAllPositions();
    dropdownContent.innerHTML = "";
    positions.forEach(pos => {
      const count = committeeData.filter(p => p.position === pos).length;
      const link = document.createElement("a");
      link.href = "#";
      link.innerText = `${pos} (${count})`;
      link.addEventListener("click", (e) => {
        e.preventDefault();
        filterByPosition(pos);
      });
      dropdownContent.appendChild(link);
    });
    const allLink = document.createElement("a");
    allLink.href = "#";
    allLink.innerText = "📋 সকল সদস্য দেখুন";
    allLink.addEventListener("click", (e) => {
      e.preventDefault();
      showAllMembers();
    });
    dropdownContent.appendChild(allLink);
  }

  // ---- initial load ----
  document.addEventListener("DOMContentLoaded", () => {
    buildDropdownMenu();
    showAllMembers();
    document.getElementById("totalMembersCount").innerText = committeeData.length;

    const homeBtn = document.getElementById("homeButton");
    homeBtn.addEventListener("click", showAllMembers);

    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    searchBtn.addEventListener("click", searchByName);
    searchInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") searchByName();
    });
  });
